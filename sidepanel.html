<!DOCTYPE html>
<html>
<head>
  <title>JSON Parse</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav>
    <ul id="json-tabs">
    </ul>
    <a href="options.html" target="_blank" class="btn" data-tooltip="Open settings  Ctrl+,">
      <span class="i-gear"></span>
    </a>
  </nav>
  <div id="search-bar">
    <div id="search-input-wrap">
      <span class="i-search"></span>
      <input id="search-input" type="text" placeholder="Search keys &amp; values…" spellcheck="false" autocomplete="off">
      <span id="search-count"></span>
      <button id="search-prev" class="search-nav-btn" data-tooltip="Previous match  Shift+Enter"><span class="i-search-prev"></span></button>
      <button id="search-next" class="search-nav-btn" data-tooltip="Next match  Enter"><span class="i-search-next"></span></button>
      <button id="search-close" data-tooltip="Close search  Esc"><span class="i-search-close"></span></button>
    </div>
  </div>
  <main id="json-panels"></main>
  <script src="sidepanel.js"></script>
</body>
</html>
